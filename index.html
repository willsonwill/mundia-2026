      --bg-box: #0d1627;
      --bg-card: #131f35;
      --bg-input: #0d1627;
      --border: #1e3050;
      --border-md: #2a4570;
      --text-1: #e2e8f0;
      --text-2: #94a3b8;
      --text-3: #4f6681;
      --accent: #3b82f6;
      --accent-bg: rgba(59,130,246,0.12);
      --green: #22c55e;
      --green-bg: rgba(34,197,94,0.12);
      --r-md: 7px;
      --r-lg: 12px;
      --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      /* compat aliases for existing CSS vars used inside JS templates */
      --color-background-primary: #131f35;
      --color-background-secondary: #0d1627;
      --color-text-primary: #e2e8f0;
      --color-text-secondary: #94a3b8;
      --color-text-tertiary: #4f6681;
      --color-border-tertiary: #1e3050;
      --color-border-secondary: #2a4570;
      --border-radius-md: 7px;
      --border-radius-lg: 12px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background: var(--bg-body);
      min-height: 100vh;
      padding: 1.5rem 1rem 3rem;
    }

    .sr-only { position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0; }

    /* ── Page box ── */
    .page-box {

      margin: 0 auto;
      background: var(--bg-box);
      border-radius: 18px;
      border: 1px solid var(--border);
      padding: 1.5rem;
      box-shadow: 0 0 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(59,130,246,0.04), inset 0 1px 0 rgba(255,255,255,0.03);

    .wrap { padding: 0; }

    .hdr-icon {
      width:42px; height:42px;
      background: linear-gradient(145deg, #1e3a8a, #0d1627);
      border-radius: 10px;
      display:flex; align-items:center; justify-content:center;
      box-shadow: 0 0 0 1px rgba(59,130,246,0.25), 0 2px 8px rgba(0,0,0,0.4);
      flex-shrink: 0;
    }
    .hdr h1 { font-size:17px; font-weight:600; color:var(--text-1); letter-spacing:-0.01em; }
    .hdr-badges { margin-left:auto; display:flex; gap:5px; }
    .bx { font-size:10px; padding:3px 10px; border-radius:20px; font-weight:500; white-space:nowrap; }
    .bx-b { background:rgba(30,58,138,0.3); color:#93c5fd; border:1px solid rgba(59,130,246,0.25); }
    .bx-g { background:rgba(20,83,45,0.3); color:#86efac; border:1px solid rgba(34,197,94,0.25); }

    /* ── Stats ── */
    .stats { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:1.25rem; }
    .sc {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 12px 8px;
      text-align: center;
    }
    .sc-n { font-size:24px; font-weight:700; color:var(--text-1); line-height:1; }
    .sc-l { font-size:10px; color:var(--text-3); margin-top:5px; text-transform:uppercase; letter-spacing:0.06em; }

    /* ── Tabs ── */
    .tabs { display:flex; gap:2px; margin-bottom:1.25rem; border-bottom:1px solid var(--border); }
    .tab {
      padding:8px 18px; font-size:12px; cursor:pointer;
      color:var(--text-2); border:none; background:none;
      border-bottom:2px solid transparent; margin-bottom:-1px;
      transition:all 0.15s; font-weight:400; letter-spacing:0.01em;
    }
    .tab.on { color:#60a5fa; border-bottom-color:var(--accent); font-weight:600; }
    .tab:hover:not(.on) { color:var(--text-1); }

    /* ── Filters ── */
    .filt {
      background: var(--bg-card);
      border-radius: var(--r-lg);
      padding: 12px 14px;
      margin-bottom: 1.25rem;
      border: 1px solid var(--border);

    .frow { display:flex; align-items:flex-start; gap:8px; margin-bottom:8px; }
    .frow:last-child { margin-bottom:0; }
    .flbl { font-size:9px; color:var(--text-3); font-weight:700; min-width:44px; padding-top:5px; text-transform:uppercase; letter-spacing:0.08em; }
    .pills { display:flex; flex-wrap:wrap; gap:4px; flex:1; }
    .pill {
      padding:3px 10px; border-radius:20px;
      border:1px solid var(--border); font-size:11px;
      cursor:pointer; background:transparent; color:var(--text-2);
      transition:all 0.12s; white-space:nowrap; line-height:1.5;

    .pill:hover { border-color:var(--border-md); color:var(--text-1); }

    .pill.gon { background:var(--accent); color:#fff; border-color:var(--accent); }

    .factions { display:flex; justify-content:flex-end; align-items:center; gap:8px; margin-top:6px; }
    .clr { font-size:11px; color:var(--text-3); cursor:pointer; background:none; border:none; padding:2px 4px; transition:color 0.1s; }
    .clr:hover { color:var(--text-1); }
    .sim-legend { font-size:10px; color:var(--text-3); display:flex; align-items:center; gap:4px; }
    .sdot { width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block; flex-shrink:0; }

    .res-info { font-size:11px; color:var(--text-3); margin-bottom:12px; }

    /* ── Day header ── */
    .day-hdr { display:flex; align-items:center; gap:10px; margin:18px 0 10px; }
    .day-hdr-line { flex:1; height:1px; background:var(--border); }
    .day-hdr-text { font-size:10px; font-weight:700; color:var(--text-2); white-space:nowrap; text-transform:uppercase; letter-spacing:0.1em; }
    .day-cnt {
      font-size:10px; color:var(--text-3);
      background:var(--bg-card); border:1px solid var(--border);
      padding:1px 8px; border-radius:20px;
    }

    .matches { display:grid; grid-template-columns:repeat(auto-fill,minmax(280px,1fr)); gap:10px; }

    .mc {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 12px 14px;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.1s;

    .tbl-t { width:100%; border-collapse:collapse; font-size:11px; table-layout:fixed; }
    .tbl-t th {

    .tbl-t td {

      border-bottom:1px solid var(--border);

      margin:20px 0 8px; padding-bottom:6px;
      border-bottom:1px solid var(--border);

    .ko-matches { display:grid; grid-template-columns:repeat(auto-fill,minmax(260px,1fr)); gap:10px; }
  </style>
</head>

const ALL=[...GM,...KO];
let db={};
let curTab='GRUPOS';
let fDate='ALL';
let fGroup='ALL';

async function loadDB(){
  try{
    if(window.storage){const r=await window.storage.get('mw26_v4');if(r)db=JSON.parse(r.value);}
    else{const r=localStorage.getItem('mw26_v4');if(r)db=JSON.parse(r);}
  }catch(e){}
}
async function saveDB(){
  try{
    if(window.storage)await window.storage.set('mw26_v4',JSON.stringify(db));
    else localStorage.setItem('mw26_v4',JSON.stringify(db));
  }catch(e){}
}

function f(t){return FL[t]||''}
function dayLabel(fecha){
  const off=ORD[fecha]||0;
  const d=new Date(BASE);d.setDate(d.getDate()+off);
  const [num,mes]=fecha.split(' ');
  return `${DIAS[d.getDay()]} ${num} ${MESES[mes]||mes}`;
}

function updStats(){
  let j=0,g=0;
  ALL.forEach(m=>{const s=db[m.id];if(s&&s.h!==''&&s.a!==''){const sh=parseInt(s.h),sa=parseInt(s.a);if(!isNaN(sh)&&!isNaN(sa)){j++;g+=sh+sa;}}});
  document.getElementById('sJ').textContent=j;
  document.getElementById('sG').textContent=g;
  document.getElementById('sP').textContent=ALL.length-j;
}

function calcSt(g){
  const st={};
  GRPS[g].forEach(t=>st[t]={name:t,j:0,gf:0,gc:0,pts:0});
  GM.filter(m=>m.g===g&&db[m.id]).forEach(m=>{
    const s=db[m.id],sh=parseInt(s.h),sa=parseInt(s.a);
    if(isNaN(sh)||isNaN(sa))return;
    if(!st[m.h]||!st[m.a])return;
    st[m.h].j++;st[m.a].j++;
    st[m.h].gf+=sh;st[m.h].gc+=sa;
    st[m.a].gf+=sa;st[m.a].gc+=sh;
    if(sh>sa)st[m.h].pts+=3;
    else if(sh===sa){st[m.h].pts++;st[m.a].pts++;}
    else st[m.a].pts+=3;
  });
  return Object.values(st).sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf);
}

function renderTabs(){
  const tabs=[{id:'GRUPOS',l:'Fase de grupos'},{id:'TABLA',l:'Posiciones'},{id:'ELIM',l:'Eliminatoria'}];
  document.getElementById('tabs').innerHTML=tabs.map(t=>`<button class="tab${curTab===t.id?' on':''}" onclick="sw('${t.id}')">${t.l}</button>`).join('');
}
function sw(id){curTab=id;fDate='ALL';fGroup='ALL';renderTabs();renderFilt();renderMain();}

function renderFilt(){
  const el=document.getElementById('filt');
  if(curTab!=='GRUPOS'){el.innerHTML='';return;}
  const dates=[...new Set(GM.map(m=>m.f))].sort((a,b)=>ORD[a]-ORD[b]);
  const byMon={};
  dates.forEach(d=>{const m=d.split(' ')[1];if(!byMon[m])byMon[m]=[];byMon[m].push(d);});
  let dpills='<button class="pill'+(fDate==='ALL'?' on':'')+'" onclick="sd(\'ALL\')">Todos</button>';
  Object.entries(byMon).forEach(([mon,ds])=>{
    dpills+=`<span class="msep">${{Jun:'jun',Jul:'jul'}[mon]||mon}</span>`;
    ds.forEach(d=>dpills+=`<button class="pill${fDate===d?' on':''}" onclick="sd('${d}')">${d.split(' ')[0]}</button>`);
  });
  const gpills='<button class="pill'+(fGroup==='ALL'?' gon':'')+'" onclick="sg(\'ALL\')">Todos</button>'+
    'ABCDEFGHIJKL'.split('').map(g=>`<button class="pill${fGroup===g?' gon':''}" onclick="sg('${g}')">${g}</button>`).join('');
  el.innerHTML=`<div class="filt"><div class="frow"><span class="flbl">Fecha</span><div class="pills">${dpills}</div></div><div class="frow"><span class="flbl">Grupo</span><div class="pills">${gpills}</div></div><div class="factions"><span class="sim-legend"><span class="sdot"></span>Simultáneo</span><button class="clr" onclick="cf()"><i class="ti ti-x" style="font-size:11px" aria-hidden="true"></i> Limpiar</button></div></div>`;
}
function sd(d){fDate=d;renderFilt();renderMain();}
function sg(g){fGroup=g;renderFilt();renderMain();}
function cf(){fDate='ALL';fGroup='ALL';renderFilt();renderMain();}

function mcard(m,ko){
  const s=db[m.id]||{};
  const done=s.h!==undefined&&s.h!==''&&s.a!==undefined&&s.a!=='';
  const gc=m.g?GC[m.g]:'#64748b';
  const gbg=m.g?GB[m.g]:'rgba(100,116,139,0.12)';
  const tag=m.g
    ?`<span class="mc-gtag" style="color:${gc};background:${gbg};border:1px solid ${gc}33">Grupo ${m.g}</span>`
    :`<span class="mc-gtag" style="color:var(--text-3);background:rgba(100,116,139,0.1);border:1px solid var(--border)">${m.r||''}</span>`;
  return `<div class="mc${done?' done':''}">
    <div class="mc-top">
      <span class="mc-hora"><i class="ti ti-clock" style="font-size:10px" aria-hidden="true"></i>${m.t} BOT${m.sim?'&nbsp;<span class="sdot" title="Simultáneo"></span>':''}</span>
      ${tag}
    </div>
    <div class="mc-body">
      <div class="mc-team">
        <span class="mc-flag">${ko?'':f(m.h)}</span>
        <span class="mc-tname">${m.h}</span>
      </div>
      <div class="mc-score">
        <input class="sinp" type="number" min="0" max="99" placeholder="-" value="${s.h!==undefined?s.h:''}" data-mid="${m.id}" data-side="h">
        <span class="vs">:</span>
        <input class="sinp" type="number" min="0" max="99" placeholder="-" value="${s.a!==undefined?s.a:''}" data-mid="${m.id}" data-side="a">
      </div>
      <div class="mc-team">
        <span class="mc-flag">${ko?'':f(m.a)}</span>
        <span class="mc-tname">${m.a}</span>
      </div>
    </div>
    <div class="mc-bot">
      <span class="mc-sede"><i class="ti ti-map-pin" style="font-size:10px" aria-hidden="true"></i>${m.s}</span>
      <button class="savebtn${done?' ok':''}" data-mid="${m.id}">${done?'✓ Guardado':'Guardar'}</button>
    </div>
  </div>`;
}

function renderMain(){
  const el=document.getElementById('main');
  if(curTab==='TABLA'){
    let h='<div class="tbl-grid">';
    'ABCDEFGHIJKL'.split('').forEach(g=>{
      const st=calcSt(g);
      h+=`<div class="tbl-card"><div class="tbl-hdr" style="background:${GHDR[g]}"><span>Grupo ${g}</span></div><table class="tbl-t"><tr><th style="width:48%">Equipo</th><th>PJ</th><th>GF</th><th>GC</th><th>Pts</th></tr>`;
      st.forEach((t,i)=>h+=`<tr class="${i===0?'rq1':i===1?'rq2':i===2?'rq3':''}"><td>${f(t.name)} ${t.name}${i<2?' ✓':''}</td><td>${t.j}</td><td>${t.gf}</td><td>${t.gc}</td><td><strong>${t.pts}</strong></td></tr>`);
      h+='</table></div>';
    });
    el.innerHTML=h+'</div><p class="tbl-note">✓ Clasifican directamente a Dieciseisavos · Los 8 mejores terceros también avanzan</p>';
    return;
  }
  if(curTab==='ELIM'){
    const rnds=[...new Set(KO.map(m=>m.r))];
    let h='';
    rnds.forEach(r=>{
      h+=`<div class="ko-rnd">${r}</div><div class="ko-matches">`;
      KO.filter(m=>m.r===r).forEach(m=>h+=mcard(m,true));
      h+='</div>';
    });
    el.innerHTML=h;bindEvts();return;
  }
  let ms=GM;
  if(fGroup!=='ALL')ms=ms.filter(m=>m.g===fGroup);
  if(fDate!=='ALL')ms=ms.filter(m=>m.f===fDate);
  if(!ms.length){el.innerHTML='<div class="empty"><i class="ti ti-calendar-off" aria-hidden="true"></i>Sin partidos para este filtro</div>';return;}
  const byD={};ms.forEach(m=>{if(!byD[m.f])byD[m.f]=[];byD[m.f].push(m);});
  const sortedD=Object.keys(byD).sort((a,b)=>ORD[a]-ORD[b]);
  let h=`<div class="res-info">${ms.length} partido${ms.length!==1?'s':''} encontrado${ms.length!==1?'s':''}</div>`;
  sortedD.forEach(fecha=>{
    const cnt=byD[fecha].length;
    h+=`<div class="day-hdr"><span class="day-hdr-text">${dayLabel(fecha)}</span><span class="day-cnt">${cnt} partido${cnt!==1?'s':''}</span><div class="day-hdr-line"></div></div>`;
    h+=`<div class="matches">`;
    byD[fecha].sort((a,b)=>a.t.localeCompare(b.t)).forEach(m=>h+=mcard(m,false));
    h+='</div>';
  });
  el.innerHTML=h;bindEvts();
}

function bindEvts(){
  document.querySelectorAll('.savebtn').forEach(btn=>{
    btn.onclick=async function(){
      const mid=this.dataset.mid;
      const hi=document.querySelector(`input[data-mid="${mid}"][data-side="h"]`);
      const ai=document.querySelector(`input[data-mid="${mid}"][data-side="a"]`);
      if(!hi||!ai)return;
      if(hi.value===''||ai.value==='')delete db[mid];
      else db[mid]={h:hi.value,a:ai.value};
      await saveDB();updStats();
      this.className='savebtn ok';this.textContent='✓ Guardado';
      setTimeout(()=>renderMain(),500);
    };
  });
}

async function init(){await loadDB();renderTabs();renderFilt();renderMain();updStats();}
init();
