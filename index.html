// ── DB: cargar ────────────────────────────────────────────────────────────────
async function loadDB(){
  if(sbClient){
    try{
      const {data,error}=await sbClient.from('match_results').select('*');
      if(!error && data?.length){
        db={};
        data.forEach(r=>{
          if(r.home_score!==null&&r.away_score!==null){
            db[r.id]={h:r.home_score,a:r.away_score,finished:r.finished||false,source:r.source||'manual'};
          }
        });
        localStorage.setItem('mw26_v4',JSON.stringify(db));
        setSyncInfo('Supabase ✓',false);
        return;
      }
    }catch(e){console.warn('Supabase load:',e);}
  }
  try{
    const r=localStorage.getItem('mw26_v4');
    if(r)db=JSON.parse(r);
    setSyncInfo('Local',false);
  }catch(e){}
}

// ── DB: guardar (solo localStorage — Supabase solo recibe resultados de la API) ──
function saveDB(){
  localStorage.setItem('mw26_v4',JSON.stringify(db));
}

// ── Supabase: guardar solo los registros que vienen de la API ─────────────────
async function saveAPIResultsToSupabase(rows){
  if(!sbClient||!rows.length) return;
  try{
    await sbClient.from('match_results').upsert(rows,{onConflict:'id'});
  }catch(e){console.warn('Supabase save:',e);}
}

// ── Sync desde API pública ────────────────────────────────────────────────────
async function syncFromAPI(){
  const btn=document.getElementById('syncBtn');
  if(btn){btn.textContent='⟳ ...';btn.disabled=true;}
  try{
    const gRes=await fetch('https://worldcup26.ir/get/games');
    if(!gRes.ok) throw new Error('HTTP '+gRes.status);
    const raw=await gRes.json();
    // La API devuelve { games: [...] } o directamente [...]
    const games=Array.isArray(raw)?raw:(raw.games||raw.data||Object.values(raw)[0]||[]);
    let updated=0;
    const apiRows=[];
    for(const g of games){
      if(g.finished!=='TRUE') continue;
      // Los nombres vienen directo en el objeto del partido
      const hEn=g.home_team_name_en||'';
      const aEn=g.away_team_name_en||'';
      const hEs=EN_ES[hEn]||hEn;
      const aEs=EN_ES[aEn]||aEn;
      if(!hEs||!aEs) continue;
      // Buscar partido en orden normal o invertido (la API puede tener local/visitante distinto)
      let match=GM.find(m=>m.h===hEs&&m.a===aEs);
      let swapped=false;
      if(!match){match=GM.find(m=>m.h===aEs&&m.a===hEs);swapped=true;}
      if(!match) continue;
      // Siempre pisa el resultado manual si la API ya tiene el resultado oficial
      const scoreH=swapped?String(g.away_score):String(g.home_score);
      const scoreA=swapped?String(g.home_score):String(g.away_score);
      db[match.id]={h:scoreH,a:scoreA,finished:true,source:'api'};
      apiRows.push({id:match.id,home_score:scoreH,away_score:scoreA,finished:true,source:'api',updated_at:new Date().toISOString()});
      updated++;
    }
    if(updated>0){
      saveDB(); // localStorage
      await saveAPIResultsToSupabase(apiRows); // solo resultados API → Supabase
      updStats();renderMain();
    }
    const ts=new Date().toISOString();
    localStorage.setItem('mw26_last_sync',ts);
    setSyncInfo(`API ✓ — ${updated} resultado${updated!==1?'s':''} nuevos · ${new Date(ts).toLocaleTimeString('es-BO')}`,false);
    if(btn){btn.textContent=`✓ +${updated}`;setTimeout(()=>{btn.textContent='↻ API';btn.disabled=false;},3000);}
    return updated;
  }catch(e){
    console.warn('API sync error:',e);
    setSyncInfo('API no disponible — usando datos locales',true);
    if(btn){btn.textContent='✗ Error';setTimeout(()=>{btn.textContent='↻ API';btn.disabled=false;},3000);}
    return 0;
  }
}

async function recargar(){
  const btn=document.getElementById('syncBtn');
  if(btn){btn.textContent='⟳ ...';btn.disabled=true;}
  // 1) Traer últimos datos de Supabase (por si otro usuario guardó algo)
  await loadDB();
  updStats();
  renderMain();
  // 2) Sincronizar resultados de la API y guardar en Supabase
  await syncFromAPI();
  // 3) Re-render final completo
  renderTabs();renderFilt();renderMain();updStats();
}

function setSyncInfo(msg,isErr){
  const el=document.getElementById('syncInfo');
  if(!el) return;
  el.innerHTML=`<span class="sb-dot${isErr?' err':''}"></span>${msg}`;
}

// Verifica si hay que sincronizar (3 AM hora Bolivia = UTC-4)
function checkAutoSync(){
  const now=new Date();
  const utcH=now.getUTCHours();
  const utcM=now.getUTCMinutes();
  // 3 AM BOT = 7:00 UTC
  const todayTarget=new Date(Date.UTC(now.getUTCFullYear(),now.getUTCMonth(),now.getUTCDate(),7,0,0));
  const lastSync=localStorage.getItem('mw26_last_sync');
  if(!lastSync){syncFromAPI();return;}
  const last=new Date(lastSync);
  if(now>=todayTarget&&last<todayTarget) syncFromAPI();
}

// ── KO Bracket: resolución de equipos ────────────────────────────────────────
function getBest8Thirds(){
  return 'ABCDEFGHIJKL'.split('')
    .map(g=>{const st=calcSt(g);return st[2]?{...st[2],group:g}:null;})
    .filter(Boolean)
    .sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf)
    .slice(0,8);
}

function resolveTeam(p){
  if(!p) return p;
  if(p in FL) return p; // Ya es equipo real
  let m;
  // 1°X
  m=p.match(/^1°([A-L])$/);
  if(m){const st=calcSt(m[1]);return st[0]?.name||p;}
  // 2°X
  m=p.match(/^2°([A-L])$/);
  if(m){const st=calcSt(m[1]);return st[1]?.name||p;}
  // 3°GROUPS
  m=p.match(/^3°([A-L]+)$/);
  if(m){
    const gs=m[1].split('');
    const b8=new Set(getBest8Thirds().map(t=>t.group));
    const cands=gs.filter(g=>b8.has(g))
      .map(g=>{const st=calcSt(g);return st[2]?{...st[2],group:g}:null;})
      .filter(Boolean)
      .sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf);
    return cands[0]?.name||p;
  }
  // G.R32-N
  m=p.match(/^G\.R32-(\d+)$/);if(m) return resolveKOW(`r32_${m[1]}`);
  // G.R16-N
  m=p.match(/^G\.R16-(\d+)$/);if(m) return resolveKOW(`r16_${m[1]}`);
  // G.QF-N
  m=p.match(/^G\.QF-(\d+)$/);if(m) return resolveKOW(`qf${m[1]}`);
  // G.SF-N (ganador)
  m=p.match(/^G\.SF-(\d+)$/);if(m) return resolveKOW(`sf${m[1]}`);
  // G.SF-NL (perdedor → 3er puesto)
  m=p.match(/^G\.SF-(\d+)L$/);if(m) return resolveKOL(`sf${m[1]}`);
  return p;
}

function resolveKOW(id){
  const match=KO.find(m=>m.id===id);
  if(!match) return id;
  const s=db[id];
  if(!s||s.h===undefined||s.h===''||s.a===undefined||s.a==='') return id;
  const sh=parseInt(s.h),sa=parseInt(s.a);
  if(isNaN(sh)||isNaN(sa)) return id;
  const hT=resolveTeam(match.h),aT=resolveTeam(match.a);
  if(sh>sa) return hT;
  if(sa>sh) return aT;
  return id; // empate → por penales, sin desempate automático
}

function resolveKOL(id){
  const match=KO.find(m=>m.id===id);
  if(!match) return id;
  const s=db[id];
  if(!s||s.h===''||s.a==='') return id;
  const sh=parseInt(s.h),sa=parseInt(s.a);
  if(isNaN(sh)||isNaN(sa)) return id;
  const hT=resolveTeam(match.h),aT=resolveTeam(match.a);
  if(sh>sa) return aT;
  if(sa>sh) return hT;
  return id;
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function f(t){return FL[t]||''}
function dayLabel(fecha){
  const off=ORD[fecha]||0;
  const d=new Date(BASE);d.setDate(d.getDate()+off);
  const [num,mes]=fecha.split(' ');
  return `${DIAS[d.getDay()]} ${num} ${MESES[mes]||mes}`;
}
function updStats(){
  let j=0,g=0;
  ALL.forEach(m=>{const s=db[m.id];if(s&&s.h!==''&&s.a!==''){const sh=parseInt(s.h),sa=parseInt(s.a);if(!isNaN(sh)&&!isNaN(sa)){j++;g+=sh+sa;}}});
  document.getElementById('sJ').textContent=j;
  document.getElementById('sG').textContent=g;
  document.getElementById('sP').textContent=ALL.length-j;
}
function calcSt(g){
  const st={};
  GRPS[g].forEach(t=>st[t]={name:t,j:0,gf:0,gc:0,pts:0});
  GM.filter(m=>m.g===g&&db[m.id]).forEach(m=>{
    const s=db[m.id],sh=parseInt(s.h),sa=parseInt(s.a);
    if(isNaN(sh)||isNaN(sa))return;
    if(!st[m.h]||!st[m.a])return;
    st[m.h].j++;st[m.a].j++;
    st[m.h].gf+=sh;st[m.h].gc+=sa;
    st[m.a].gf+=sa;st[m.a].gc+=sh;
    if(sh>sa)st[m.h].pts+=3;
    else if(sh===sa){st[m.h].pts++;st[m.a].pts++;}
    else st[m.a].pts+=3;
  });
  return Object.values(st).sort((a,b)=>b.pts-a.pts||(b.gf-b.gc)-(a.gf-a.gc)||b.gf-a.gf);
}

// ── Filters ───────────────────────────────────────────────────────────────────
function renderFilt(){
  const el=document.getElementById('filt');
  if(curTab!=='GRUPOS'){el.innerHTML='';return;}
  const dates=[...new Set(GM.map(m=>m.f))].sort((a,b)=>ORD[a]-ORD[b]);
  const byMon={};
  dates.forEach(d=>{const m=d.split(' ')[1];if(!byMon[m])byMon[m]=[];byMon[m].push(d);});
  let dpills=`<button class="pill${fDate==='ALL'?' on':''}" onclick="sd('ALL')">Todos</button>`;
  Object.entries(byMon).forEach(([mon,ds])=>{
    dpills+=`<span class="msep">${{Jun:'jun',Jul:'jul'}[mon]||mon}</span>`;
    ds.forEach(d=>dpills+=`<button class="pill${fDate===d?' on':''}" onclick="sd('${d}')">${d.split(' ')[0]}</button>`);
  });
  const gpills=`<button class="pill${fGroup==='ALL'?' gon':''}" onclick="sg('ALL')">Todos</button>`+
    'ABCDEFGHIJKL'.split('').map(g=>`<button class="pill${fGroup===g?' gon':''}" onclick="sg('${g}')">${g}</button>`).join('');
  el.innerHTML=`<div class="filt"><div class="frow"><span class="flbl">Fecha</span><div class="pills">${dpills}</div></div><div class="frow"><span class="flbl">Grupo</span><div class="pills">${gpills}</div></div><div class="factions"><span class="sim-legend"><span class="sdot"></span>Simultáneo</span><button class="clr" onclick="cf()"><i class="ti ti-x" style="font-size:11px"></i> Limpiar</button></div></div>`;
}

function sg(g){fGroup=g;renderFilt();renderMain();}
function cf(){fDate='ALL';fGroup='ALL';renderFilt();renderMain();}

// ── Match card ────────────────────────────────────────────────────────────────
function mcard(m,ko){
  const s=db[m.id]||{};
  const done=s.h!==undefined&&s.h!==''&&s.a!==undefined&&s.a!=='';
  const isFinished=s.finished||false;

  // Para KO, resolver nombres reales
  const dH=ko?resolveTeam(m.h):m.h;
  const dA=ko?resolveTeam(m.a):m.a;
  const hKnown=ko?isKnown(dH):true;
  const aKnown=ko?isKnown(dA):true;
  const teamsOk=hKnown&&aKnown;
  const canEdit=!isFinished&&(teamsOk||!ko);

  const gc=m.g?GC[m.g]:'#64748b';
  const gbg=m.g?GB[m.g]:'rgba(100,116,139,0.12)';
  const tag=m.g
    ?`<span class="mc-gtag" style="color:${gc};background:${gbg};border:1px solid ${gc}33">Grupo ${m.g}</span>`
    :`<span class="mc-gtag" style="color:var(--text-3);background:rgba(100,116,139,0.1);border:1px solid var(--border)">${m.r||''}</span>`;

  let botBtn='';
  if(isFinished){
    botBtn=`<span class="savebtn locked">🔒 Finalizado</span>`;
  } else if(!teamsOk&&ko){
    botBtn=`<span class="savebtn pending">Por definir</span>`;
  } else {
    botBtn=`<button class="savebtn${done?' ok':''}" data-mid="${m.id}">${done?'✓ Guardado':'Guardar'}</button>`;
  }

  return `<div class="mc${done?' done':''}${isFinished?' mc-locked':''}${!teamsOk&&ko?' mc-pending':''}">
    <div class="mc-top">
      <span class="mc-hora"><i class="ti ti-clock" style="font-size:10px"></i>${m.t} BOT${m.sim?'&nbsp;<span class="sdot" title="Simultáneo"></span>':''}</span>
      ${tag}
    </div>
    <div class="mc-body">
      <div class="mc-team">
        <span class="mc-flag">${f(dH)}</span>
        <span class="mc-tname${!hKnown&&ko?' placeholder':''}">${dH}</span>
      </div>
      <div class="mc-score">
        <input class="sinp" type="number" min="0" max="99" placeholder="-"
          value="${s.h!==undefined?s.h:''}"
          data-mid="${m.id}" data-side="h"${!canEdit?' disabled':''}>
        <span class="vs">:</span>
        <input class="sinp" type="number" min="0" max="99" placeholder="-"
          value="${s.a!==undefined?s.a:''}"
          data-mid="${m.id}" data-side="a"${!canEdit?' disabled':''}>
      </div>
      <div class="mc-team">
        <span class="mc-flag">${f(dA)}</span>
        <span class="mc-tname${!aKnown&&ko?' placeholder':''}">${dA}</span>
      </div>
    </div>
    <div class="mc-bot">
      <span class="mc-sede"><i class="ti ti-map-pin" style="font-size:10px"></i>${m.s}</span>
      ${botBtn}
    </div>
  </div>`;
}

// ── Render principal ──────────────────────────────────────────────────────────
function renderMain(){
  const el=document.getElementById('main');

  // ── POSICIONES ──
  if(curTab==='TABLA'){
    let h='<div class="tbl-grid">';
    'ABCDEFGHIJKL'.split('').forEach(g=>{
      const st=calcSt(g);
      h+=`<div class="tbl-card"><div class="tbl-hdr" style="background:${GHDR[g]}"><span>Grupo ${g}</span></div>
        <table class="tbl-t"><tr><th style="width:48%">Equipo</th><th>PJ</th><th>GF</th><th>GC</th><th>Pts</th></tr>`;
      st.forEach((t,i)=>h+=`<tr class="${i===0?'rq1':i===1?'rq2':i===2?'rq3':''}">
        <td>${f(t.name)} ${t.name}${i<2?' ✓':''}</td><td>${t.j}</td><td>${t.gf}</td><td>${t.gc}</td><td><strong>${t.pts}</strong></td></tr>`);
      h+='</table></div>';
    });
    el.innerHTML=h+'</div><p class="tbl-note">✓ Clasifican a Dieciseisavos · Los 8 mejores terceros también avanzan</p>';
    return;
  }

  // ── ELIMINATORIA ──
  if(curTab==='ELIM'){
    const rnds=[...new Set(KO.map(m=>m.r))];
    let h='';
    rnds.forEach(r=>{
      h+=`<div class="ko-rnd">${r}</div><div class="ko-matches">`;
      KO.filter(m=>m.r===r).forEach(m=>{
        // Resolver nombres para mostrar, pero mantener id original
        const rH=resolveTeam(m.h);
        const rA=resolveTeam(m.a);
        h+=mcard({...m,h:rH,a:rA},true);
      });
      h+='</div>';
    });
    el.innerHTML=h;
    bindEvts();
    return;
  }

  // ── FASE DE GRUPOS ──
  let ms=GM;
  if(fGroup!=='ALL') ms=ms.filter(m=>m.g===fGroup);
  if(fDate!=='ALL') ms=ms.filter(m=>m.f===fDate);
  if(!ms.length){el.innerHTML='<div class="empty"><i class="ti ti-calendar-off"></i>Sin partidos para este filtro</div>';return;}
  const byD={};ms.forEach(m=>{if(!byD[m.f])byD[m.f]=[];byD[m.f].push(m);});
  const sortedD=Object.keys(byD).sort((a,b)=>ORD[a]-ORD[b]);
  let h=`<div class="res-info">${ms.length} partido${ms.length!==1?'s':''} encontrado${ms.length!==1?'s':''}</div>`;
  sortedD.forEach(fecha=>{
    const cnt=byD[fecha].length;
    h+=`<div class="day-hdr"><span class="day-hdr-text">${dayLabel(fecha)}</span><span class="day-cnt">${cnt} partido${cnt!==1?'s':''}</span><div class="day-hdr-line"></div></div>`;
    h+=`<div class="matches">`;
    byD[fecha].sort((a,b)=>a.t.localeCompare(b.t)).forEach(m=>h+=mcard(m,false));
    h+='</div>';
  });
  el.innerHTML=h;
  bindEvts();
}

// ── Eventos (guardar resultado) ───────────────────────────────────────────────
function bindEvts(){
  document.querySelectorAll('.savebtn[data-mid]').forEach(btn=>{
    btn.onclick=async function(){
      const mid=this.dataset.mid;
      const hi=document.querySelector(`input[data-mid="${mid}"][data-side="h"]`);
      const ai=document.querySelector(`input[data-mid="${mid}"][data-side="a"]`);
      if(!hi||!ai) return;
      if(hi.value===''||ai.value===''){
        delete db[mid];
      } else {
        db[mid]={h:hi.value,a:ai.value,finished:false,source:'manual'};
      }
      saveDB();
      updStats();
      this.className='savebtn ok';
      this.textContent='✓ Guardado';
      // Re-render todo para actualizar posiciones y eliminatoria
      setTimeout(()=>{renderTabs();renderFilt();renderMain();},400);
    };
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
async function init(){
  await loadDB();
  renderTabs();
  renderFilt();
  renderMain();
  updStats();
  checkAutoSync();
}
init();
</script>
